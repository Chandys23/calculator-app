<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Calculator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="calculator">
            <div class="display">
                <input type="text" id="expression" placeholder="0" readonly>
                <div id="result" class="result-display">0</div>
            </div>
            
            <div class="buttons">
                <button class="btn function-btn" onclick="clearDisplay()">C</button>
                <button class="btn function-btn" onclick="deleteLast()">←</button>
                <button class="btn function-btn" onclick="addToExpression('%')">%</button>
                <button class="btn operator-btn" onclick="addToExpression('/')">÷</button>
                
                <button class="btn" onclick="addToExpression('7')">7</button>
                <button class="btn" onclick="addToExpression('8')">8</button>
                <button class="btn" onclick="addToExpression('9')">9</button>
                <button class="btn operator-btn" onclick="addToExpression('*')">×</button>
                
                <button class="btn" onclick="addToExpression('4')">4</button>
                <button class="btn" onclick="addToExpression('5')">5</button>
                <button class="btn" onclick="addToExpression('6')">6</button>
                <button class="btn operator-btn" onclick="addToExpression('-')">−</button>
                
                <button class="btn" onclick="addToExpression('1')">1</button>
                <button class="btn" onclick="addToExpression('2')">2</button>
                <button class="btn" onclick="addToExpression('3')">3</button>
                <button class="btn operator-btn" onclick="addToExpression('+')">+</button>
                
                <button class="btn" onclick="addToExpression('0')">0</button>
                <button class="btn" onclick="addToExpression('.')">.</button>
                <button class="btn function-btn" onclick="toggleSign()">+/−</button>
                <button class="btn equals-btn" onclick="calculate()">=</button>
                
                <button class="btn function-btn wide" onclick="addFunction('sqrt')">√</button>
                <button class="btn function-btn wide" onclick="addFunction('sin')">sin</button>
                <button class="btn function-btn wide" onclick="addFunction('cos')">cos</button>
                <button class="btn function-btn wide" onclick="addFunction('tan')">tan</button>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
